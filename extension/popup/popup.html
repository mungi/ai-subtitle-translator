<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="popupTitle"></title>
    <link rel="stylesheet" href="./popup.css">
    <script type="module" src="./popup.js"></script>
  </head>
  <body>
    <main>
      <header class="popup-header">
        <img class="brand-mark" src="../icons/icon48.png" alt="">
        <div>
          <p class="eyebrow">AI Subtitle Translator</p>
          <h1 id="popupHeading" data-i18n="popupHeading"></h1>
        </div>
      </header>
      <section class="summary-card" aria-labelledby="popupHeading">
        <dl class="settings-summary">
          <dt data-i18n="popupProvider"></dt>
          <dd id="providerName">-</dd>
          <dt data-i18n="popupTargetLanguage"></dt>
          <dd id="targetLanguage">-</dd>
          <dt data-i18n="translationStyle"></dt>
          <dd id="translationStyle">-</dd>
        </dl>
      </section>
      <button id="openOptions" type="button" data-i18n="popupOpenSettings"></button>
      <p id="statusLine" class="status-line" role="status"></p>
    </main>
  </body>
</html>
