<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="popupTitle"></title>
    <link rel="stylesheet" href="./popup.css">
    <script type="module" src="./popup.js"></script>
  </head>
  <body>
    <main>
      <h1 data-i18n="popupHeading"></h1>
      <dl>
        <dt data-i18n="popupProvider"></dt>
        <dd id="providerName">-</dd>
        <dt data-i18n="popupTargetLanguage"></dt>
        <dd id="targetLanguage">-</dd>
      </dl>
      <section class="platform-toggles" data-i18n-aria-label="popupPlatformToggles">
        <label>
          <input id="toggleUdemy" type="checkbox">
          <span>Udemy</span>
        </label>
        <label>
          <input id="toggleYoutube" type="checkbox">
          <span>YouTube</span>
        </label>
      </section>
      <button id="openOptions" type="button" data-i18n="popupOpenSettings"></button>
      <p id="statusLine" class="status-line" role="status"></p>
    </main>
  </body>
</html>
